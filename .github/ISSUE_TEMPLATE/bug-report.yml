name: Bug Report
description: Report a problem with bilingual fields for faster triage / 使用中英双语字段提交问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量完整填写。安装方式请按官方安装说明中的叫法选择，避免排查歧义。
        Please fill in as completely as possible. Use installation terms consistent with official docs.

  - type: dropdown
    id: severity
    attributes:
      label: 问题严重性 / Severity
      description: 请选择最符合当前影响范围的级别 / Choose the level that best matches impact scope
      options:
        - 严重 / Critical - 主控崩溃（Controller crash）
        - 高 / High - 影响部分功能正常使用（Part of features are unusable）
        - 中 / Medium - 前端显示问题但功能无误（UI issue, functionality works）
        - 低 / Low - 轻微问题或优化建议（Minor issue or improvement）
    validations:
      required: true

  - type: dropdown
    id: controller_install_method
    attributes:
      label: 主控安装方式 / Controller Install Method
      description: 对齐安装文档《面板端》的安装分类 / Match official panel-side installation categories
      options:
        - 预编译二进制 - 前后端分离部署 / Prebuilt Binary - Frontend/Backend Separated
        - 预编译二进制 - 一体化部署 / Prebuilt Binary - All-in-One
        - Docker安装 - 预构建镜像（latest/allinone/no-db） / Docker - Prebuilt Image
        - Docker安装 - DockerCompose自编译 / Docker - Compose Self-build
        - Docker安装 - Dockerfile自编译 / Docker - Dockerfile Self-build
        - 其他（请在问题描述中说明） / Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: node_install_method
    attributes:
      label: 节点安装方式 / Node Install Method
      description: 对齐安装文档《受控端》的环境准备方式 / Match official controlled-node environment setup
      options:
        - 通过 oneclickvirt 对应虚拟化脚本安装环境 / oneclickvirt virtualization script
        - 第三方已有虚拟化环境（仅纳管） / Third-party existing virtualization environment
        - 手动安装/自定义环境 / Manual or custom environment setup
        - 其他（请在问题描述中说明） / Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: manual_api_reverse_proxy
    attributes:
      label: 是否手动进行过API反代 / Manual API Reverse Proxy
      description: 例如 Nginx/OpenResty/Caddy/1Panel 等手动反代 /api 与 /api/v1/ws/ / e.g. manually proxying /api and /api/v1/ws/
      options:
        - 否 / No
        - 是 / Yes
    validations:
      required: true

  - type: dropdown
    id: controller_domain_binding
    attributes:
      label: 主控是否绑定域名进行显示 / Domain-bound Controller Access
      description: 是否通过域名访问面板（而非直接 IP:端口） / Accessing panel via domain instead of direct IP:port
      options:
        - 否 / No
        - 是 / Yes
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: 具体问题描述 / Problem Description
      description: 请提供复现步骤、预期行为、实际行为 / Include reproduction steps, expected behavior, actual behavior
      placeholder: |
        1. 复现步骤：...
        2. 预期行为：...
        3. 实际行为：...

        1. Reproduction steps: ...
        2. Expected behavior: ...
        3. Actual behavior: ...
    validations:
      required: true

  - type: textarea
    id: related_logs
    attributes:
      label: 相关日志 / Related Logs
      description: 请尽量附上主控日志、节点日志、浏览器控制台日志、反代日志 / Attach controller, node, browser console, and proxy logs when possible
      placeholder: |
        主控日志:
        ...

        节点日志:
        ...

        浏览器控制台:
        ...

        反代日志:
        ...

        Controller logs:
        ...

        Node logs:
        ...

        Browser console:
        ...

        Proxy logs:
        ...
    validations:
      required: true
