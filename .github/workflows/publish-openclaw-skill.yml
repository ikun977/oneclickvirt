name: Publish OpenClaw Skill

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'mcp.json'
      - 'scripts/skill_release_check.sh'
      - '.github/workflows/publish-openclaw-skill.yml'
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: openclaw-skill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate skill files
        run: |
          VERSION=""
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME:-}"
          fi
          bash scripts/skill_release_check.sh "${VERSION}"

      - name: Package skill
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist/oneclickvirt
          cp skills/SKILL.md skills/SKILL_ZH.md mcp.json dist/oneclickvirt/
          tar -czf "oneclickvirt-skill-${VERSION}.tar.gz" -C dist oneclickvirt
          sha256sum "oneclickvirt-skill-${VERSION}.tar.gz" > "oneclickvirt-skill-${VERSION}.sha256"

      - name: Upload packaged skill artifact
        uses: actions/upload-artifact@v6
        with:
          name: oneclickvirt-skill
          path: |
            oneclickvirt-skill-*.tar.gz
            oneclickvirt-skill-*.sha256
          if-no-files-found: error

  publish-release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate-and-package
    permissions:
      contents: write
    steps:
      - name: Download packaged skill artifact
        uses: actions/download-artifact@v7
        with:
          name: oneclickvirt-skill

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oneclickvirt-skill-*.tar.gz
            oneclickvirt-skill-*.sha256
