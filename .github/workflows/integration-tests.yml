name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Virtualization environment to test (one at a time)'
        required: true
        type: choice
        options:
          - docker
          - lxd
          - incus
          - podman
          - containerd
          - proxmoxve
        default: 'docker'
      platform:
        description: 'Cloud platform to use (auto = priority-order fallback)'
        required: false
        type: choice
        options:
          - auto
          - alice
          - lightnode
          - vultr
          - hetzner
          - linode
          - rackdog
          - skrime
          - prepaidhost
          - cubepath
          - cloudsigma
        default: 'auto'
      instance_types:
        description: 'Instance types to test (auto-corrected per platform)'
        required: true
        type: choice
        options:
          - both
          - container
          - vm
        default: 'container'
      modules:
        description: 'Test modules to run (e.g. all, 01-10, 01,03,05)'
        required: false
        type: string
        default: 'all'
      node_hours:
        description: 'Node lifetime in hours'
        required: false
        type: string
        default: '8'
      skip_instance_delete:
        description: 'Skip instance deletion after tests (keep alive)'
        required: false
        type: boolean
        default: false

jobs:
  integration-test:
    name: "Test: ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl sshpass

      - name: Setup MySQL
        run: |
          sudo systemctl start mysql
          sleep 5
          # Ubuntu's mysql-server uses auth_socket for root; connect via sudo (no -u flag)
          # Match Dockerfile: use mysql_native_password with empty password
          if sudo mysql -e "SELECT 1" 2>/dev/null; then
            echo "auth_socket OK – configuring root with mysql_native_password"
            sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; DROP USER IF EXISTS 'root'@'127.0.0.1'; CREATE USER 'root'@'127.0.0.1' IDENTIFIED WITH mysql_native_password BY ''; GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION; FLUSH PRIVILEGES;"
          else
            echo "auth_socket failed – trying with password 'root'"
            mysql -u root -proot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; DROP USER IF EXISTS 'root'@'127.0.0.1'; CREATE USER 'root'@'127.0.0.1' IDENTIFIED WITH mysql_native_password BY ''; GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION; FLUSH PRIVILEGES;"
          fi
          # Verify TCP connectivity (what the Go server uses)
          mysql -u root -h 127.0.0.1 -P 3306 -e "SELECT 1;" && echo "MySQL TCP OK"

      - name: Validate platform and instance types
        id: validate
        run: |
          ENV="${{ inputs.environment }}"
          TYPES="${{ inputs.instance_types }}"
          PLATFORM="${{ inputs.platform }}"
          # Platform capabilities (hardcoded)
          case "$ENV" in
            docker|podman|containerd)
              if [[ "$TYPES" == "vm" || "$TYPES" == "both" ]]; then
                echo "::warning::Platform '${ENV}' only supports containers. Auto-correcting instance_types to 'container'."
                TYPES="container"
              fi
              ;;
            lxd|incus|proxmoxve)
              # Supports both container and vm
              ;;
            *)
              echo "::error::Unknown platform: ${ENV}"
              exit 1
              ;;
          esac
          echo "instance_types=${TYPES}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "Validated: env=${ENV} instance_types=${TYPES} platform=${PLATFORM}"

      - name: Run integration tests
        env:
          # Alice platform
          ALICE_CLIENT_ID: ${{ secrets.ALICE_CLIENT_ID }}
          ALICE_CLIENT_SECRET: ${{ secrets.ALICE_CLIENT_SECRET }}
          ALICE_PUBLIC_KEY: ${{ secrets.ALICE_PUBLIC_KEY }}
          ALICE_PRIVATE_KEY: ${{ secrets.ALICE_PRIVATE_KEY }}
          # LightNode platform
          LIGHTNODE_TOKEN: ${{ secrets.LIGHTNODE_TOKEN }}
          LIGHTNODE_PRIVATE_KEY: ${{ secrets.LIGHTNODE_PRIVATE_KEY }}
          LIGHTNODE_SSH_KEY_UUID: ${{ secrets.LIGHTNODE_SSH_KEY_UUID }}
          # Vultr platform
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          VULTR_PRIVATE_KEY: ${{ secrets.VULTR_PRIVATE_KEY }}
          VULTR_SSH_KEY_ID: ${{ secrets.VULTR_SSH_KEY_ID }}
          # Hetzner platform
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          # Linode platform
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          LINODE_PRIVATE_KEY: ${{ secrets.LINODE_PRIVATE_KEY }}
          LINODE_SSH_PUBLIC_KEY: ${{ secrets.LINODE_SSH_PUBLIC_KEY }}
          # RackDog platform
          RACKDOG_API_KEY: ${{ secrets.RACKDOG_API_KEY }}
          RACKDOG_PRIVATE_KEY: ${{ secrets.RACKDOG_PRIVATE_KEY }}
          RACKDOG_SSH_PUBLIC_KEY: ${{ secrets.RACKDOG_SSH_PUBLIC_KEY }}
          # Skrime platform
          SKRIME_API_KEY: ${{ secrets.SKRIME_API_KEY }}
          SKRIME_ROOT_PASSWORD: ${{ secrets.SKRIME_ROOT_PASSWORD }}
          # PrepaidHost platform
          PREPAIDHOST_API_KEY: ${{ secrets.PREPAIDHOST_API_KEY }}
          PREPAIDHOST_ROOT_PASSWORD: ${{ secrets.PREPAIDHOST_ROOT_PASSWORD }}
          # Cubepath platform
          CUBEPATH_API_KEY: ${{ secrets.CUBEPATH_API_KEY }}
          CUBEPATH_PRIVATE_KEY: ${{ secrets.CUBEPATH_PRIVATE_KEY }}
          CUBEPATH_SSH_PUBLIC_KEY: ${{ secrets.CUBEPATH_SSH_PUBLIC_KEY }}
          # CloudSigma platform
          CLOUDSIGMA_EMAIL: ${{ secrets.CLOUDSIGMA_EMAIL }}
          CLOUDSIGMA_PASSWORD: ${{ secrets.CLOUDSIGMA_PASSWORD }}
          CLOUDSIGMA_PRIVATE_KEY: ${{ secrets.CLOUDSIGMA_PRIVATE_KEY }}
          # Platform selection (auto = try all enabled in priority order)
          PLATFORM_SELECTION: ${{ steps.validate.outputs.platform }}
          SKIP_INSTANCE_DELETE: ${{ inputs.skip_instance_delete }}
          # Test settings
          ENV_TYPE: ${{ inputs.environment }}
          INSTANCE_TYPES: ${{ steps.validate.outputs.instance_types }}
          NODE_HOURS: ${{ inputs.node_hours }}
          ADMIN_USER: admin
          ADMIN_PASS: ${{ secrets.TEST_ADMIN_PASS || 'Admin123!@#' }}
          DEBUG: "1"
        run: |
          chmod +x action_tests/run_env_test.sh
          chmod +x action_tests/run_module.sh
          chmod -R +x action_tests/modules/ 2>/dev/null || true
          chmod -R +x action_tests/common/ 2>/dev/null || true
          chmod -R +x action_tests/report/ 2>/dev/null || true
          mkdir -p action_tests/reports

          # Auto-enable platform based on selection
          if [[ "$PLATFORM_SELECTION" != "auto" ]]; then
            # Disable all, enable only the selected one
            export PLATFORM_ALICE_ENABLED=false
            export PLATFORM_LIGHTNODE_ENABLED=false
            export PLATFORM_VULTR_ENABLED=false
            export PLATFORM_HETZNER_ENABLED=false
            export PLATFORM_LINODE_ENABLED=false
            export PLATFORM_RACKDOG_ENABLED=false
            export PLATFORM_SKRIME_ENABLED=false
            export PLATFORM_PREPAIDHOST_ENABLED=false
            export PLATFORM_CUBEPATH_ENABLED=false
            export PLATFORM_CLOUDSIGMA_ENABLED=false
            PLATFORM_VAR="PLATFORM_$(echo "$PLATFORM_SELECTION" | tr '[:lower:]' '[:upper:]')_ENABLED"
            export "${PLATFORM_VAR}=true"
          else
            # Auto mode: enable alice (default) + lightnode (fallback) if secrets are set
            export PLATFORM_ALICE_ENABLED=true
            [[ -n "${LIGHTNODE_TOKEN:-}" ]] && export PLATFORM_LIGHTNODE_ENABLED=true
            [[ -n "${VULTR_API_KEY:-}" ]] && export PLATFORM_VULTR_ENABLED=true
            [[ -n "${HETZNER_API_TOKEN:-}" ]] && export PLATFORM_HETZNER_ENABLED=true
            [[ -n "${LINODE_TOKEN:-}" ]] && export PLATFORM_LINODE_ENABLED=true
            [[ -n "${RACKDOG_API_KEY:-}" ]] && export PLATFORM_RACKDOG_ENABLED=true
            [[ -n "${SKRIME_API_KEY:-}" ]] && export PLATFORM_SKRIME_ENABLED=true
            [[ -n "${PREPAIDHOST_API_KEY:-}" ]] && export PLATFORM_PREPAIDHOST_ENABLED=true
            [[ -n "${CUBEPATH_API_KEY:-}" ]] && export PLATFORM_CUBEPATH_ENABLED=true
            [[ -n "${CLOUDSIGMA_EMAIL:-}" ]] && export PLATFORM_CLOUDSIGMA_ENABLED=true
          fi

          # Run with error capture - never fail silently
          set +e
          bash action_tests/run_env_test.sh \
            "${{ inputs.environment }}" \
            "${{ inputs.modules }}" \
            "${{ steps.validate.outputs.instance_types }}" 2>&1 | tee action_tests/reports/full-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          # Ensure we always have SOME output for debugging
          if [[ ! -s action_tests/reports/full-output.log ]]; then
            echo "WARNING: Test produced no output. Check ALICE_CLIENT_ID, ALICE_CLIENT_SECRET, ALICE_PUBLIC_KEY, and ALICE_PRIVATE_KEY secrets." > action_tests/reports/full-output.log
          fi

          # Ensure report directory has at least a fallback file
          if ! ls action_tests/reports/*.html 1>/dev/null 2>&1; then
            echo "<html><body><h1>Test Failed</h1><p>Exit code: ${TEST_EXIT}</p><pre>$(cat action_tests/reports/full-output.log | tail -100)</pre></body></html>" > "action_tests/reports/${{ inputs.environment }}-report.html"
          fi

          exit $TEST_EXIT

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-${{ inputs.environment }}-${{ github.run_number }}
          path: |
            action_tests/reports/*.html
            action_tests/reports/*.md
            action_tests/reports/*.log
            action_tests/reports/*.txt
            action_tests/reports/*.jsonl
          retention-days: 30

      - name: Publish to GitHub Pages
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_BRANCH="gh-pages"
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          ENV="${{ inputs.environment }}"

          # Clone or init gh-pages branch
          git clone --depth 1 --branch "$REPORT_BRANCH" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            report-repo 2>/dev/null || {
              mkdir -p report-repo
              cd report-repo
              git init
              git checkout -b "$REPORT_BRANCH"
              cd ..
            }

          # Copy reports
          mkdir -p "report-repo/reports/${ENV}/${TIMESTAMP}"
          cp action_tests/reports/*.html "report-repo/reports/${ENV}/${TIMESTAMP}/" 2>/dev/null || true

          # Prune old reports: keep only the latest 7 runs per environment
          KEEP=7
          if [[ -d "report-repo/reports/${ENV}" ]]; then
            SORTED=$(ls -d "report-repo/reports/${ENV}/"*/ 2>/dev/null | sort -r)
            COUNT=0
            while IFS= read -r dir; do
              COUNT=$((COUNT + 1))
              if [[ $COUNT -gt $KEEP ]]; then
                rm -rf "$dir"
                echo "Pruned old report: $dir"
              fi
            done <<< "$SORTED"
          fi

          # Generate top-level index
          cd report-repo
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">'
            echo '<title>OneClickVirt Test Reports</title>'
            echo '<style>'
            echo ':root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--border:#334155}'
            echo '*{margin:0;padding:0;box-sizing:border-box}'
            echo "body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:2rem}"
            echo '.container{max-width:1000px;margin:0 auto}'
            echo 'h1{font-size:2rem;margin-bottom:1rem}'
            echo 'h2{font-size:1.3rem;margin:1.5rem 0 0.8rem}'
            echo '.meta{color:#94a3b8;margin-bottom:2rem}'
            echo '.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:0.8rem}'
            echo '.card:hover{border-color:#60a5fa}'
            echo 'a{color:#60a5fa;text-decoration:none}'
            echo 'a:hover{text-decoration:underline}'
            echo '</style>'
            echo '</head>'
            echo '<body>'
            echo '<div class="container">'
            echo '<h1>OneClickVirt Integration Test Reports</h1>'
            echo '<p class="meta">Reports are organized by environment and date.</p>'
          } > index.html

          if [[ -d reports ]]; then
            for envdir in reports/*/; do
              [[ ! -d "$envdir" ]] && continue
              envname=$(basename "$envdir")
              echo "<h2>${envname}</h2>" >> index.html
              for tsdir in $(ls -dr "$envdir"*/ 2>/dev/null); do
                [[ ! -d "$tsdir" ]] && continue
                tsname=$(basename "$tsdir")
                for f in "$tsdir"*.html; do
                  [[ ! -f "$f" ]] && continue
                  fname=$(basename "$f")
                  echo "<div class=\"card\"><a href=\"${f}\">${tsname} - ${fname}</a></div>" >> index.html
                done
              done
            done
          fi

          echo '</div></body></html>' >> index.html

          # Commit and push
          git add -A
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Update test reports: ${ENV} ${TIMESTAMP}" || true
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$REPORT_BRANCH" 2>/dev/null || {
            echo "::warning::Failed to push to gh-pages. This is non-critical."
          }

      - name: Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | ${{ inputs.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance Types | ${{ steps.validate.outputs.instance_types }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Modules | ${{ inputs.modules }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "action_tests/reports/${{ inputs.environment }}-report.md" ]]; then
            cat "action_tests/reports/${{ inputs.environment }}-report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No markdown report file found." >> $GITHUB_STEP_SUMMARY
          fi
          # Also show last 30 lines of output for quick debugging
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Last 30 lines of test output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 action_tests/reports/full-output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output log found"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
