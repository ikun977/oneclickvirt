name: 集体测试

on:
  workflow_dispatch:
    inputs:
      environments:
        description: '待测试的虚拟化环境（逗号分隔，如 docker,lxd,incus,podman,containerd,proxmoxve）'
        required: false
        default: 'docker,lxd,incus,podman,containerd,proxmoxve'
      node_hours:
        description: '节点租用时长（小时）'
        required: false
        default: '8'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # 解析输入，生成矩阵
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 生成测试矩阵
        id: set-matrix
        run: |
          ENVS="${{ github.event.inputs.environments || 'docker,lxd,incus,podman,containerd,proxmoxve' }}"
          MATRIX=$(echo "$ENVS" | tr ',' '\n' | jq -R -s 'split("\n") | map(select(length > 0))' | jq -c '{env: .}')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "测试矩阵: ${MATRIX}"

  # ============================================================
  # 每种虚拟化环境的集成测试
  # ============================================================
  integration-test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: 测试 ${{ matrix.env }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl netcat-openbsd

      - name: 设置脚本权限
        run: |
          chmod +x action_tests/common/*.sh
          chmod +x action_tests/${{ matrix.env }}/run.sh

      - name: 运行 ${{ matrix.env }} 集成测试
        env:
          ALICE_CLIENT_ID: ${{ secrets.ALICE_CLIENT_ID }}
          ALICE_CLIENT_SECRET: ${{ secrets.ALICE_CLIENT_SECRET }}
          NODE_HOURS: ${{ github.event.inputs.node_hours || '8' }}
        run: |
          echo "=============================="
          echo "开始 ${{ matrix.env }} 虚拟化环境集成测试"
          echo "节点时长: ${NODE_HOURS} 小时"
          echo "=============================="

          cd action_tests/${{ matrix.env }}
          bash run.sh 2>&1 | tee test_output.log

          # 保存退出码
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "=============================="
          echo "${{ matrix.env }} 测试完成，退出码: ${TEST_EXIT_CODE}"
          echo "=============================="

          exit ${TEST_EXIT_CODE}

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.env }}
          path: |
            action_tests/${{ matrix.env }}/README.md
            action_tests/${{ matrix.env }}/test_output.log
          retention-days: 30

  # ============================================================
  # 汇总报告
  # ============================================================
  summary:
    needs: integration-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有测试报告
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: 生成汇总报告
        run: |
          echo "# 集成测试汇总报告" > summary.md
          echo "" >> summary.md
          echo "测试时间: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> summary.md
          echo "" >> summary.md
          echo "## 各环境测试结果" >> summary.md
          echo "" >> summary.md
          echo "| 环境 | 状态 | 报告 |" >> summary.md
          echo "|------|------|------|" >> summary.md

          for env_dir in reports/test-report-*/; do
            if [[ -d "$env_dir" ]]; then
              env_name=$(basename "$env_dir" | sed 's/test-report-//')

              if [[ -f "${env_dir}/README.md" ]]; then
                # 从报告中提取通过率
                pass_rate=$(grep -oP '通过率 \| \K[^|]+' "${env_dir}/README.md" 2>/dev/null | tr -d ' ' || echo "未知")
                total=$(grep -oP '总计 \| \K[^|]+' "${env_dir}/README.md" 2>/dev/null | tr -d ' ' || echo "0")
                failed=$(grep -oP '失败 \| \K[^|]+' "${env_dir}/README.md" 2>/dev/null | tr -d ' ' || echo "0")

                if [[ "$failed" == "0" && "$total" != "0" ]]; then
                  echo "| ${env_name} | PASS | 通过率 ${pass_rate}, 共 ${total} 项 |" >> summary.md
                else
                  echo "| ${env_name} | FAIL | 通过率 ${pass_rate}, 共 ${total} 项, ${failed} 失败 |" >> summary.md
                fi
              else
                echo "| ${env_name} | ERROR | 未生成测试报告 |" >> summary.md
              fi
            fi
          done

          echo "" >> summary.md
          echo "---" >> summary.md
          echo "" >> summary.md
          echo "详细报告见各环境的 artifact" >> summary.md

          echo ""
          echo "===== 汇总报告 ====="
          cat summary.md

      - name: 上传汇总报告
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-summary
          path: summary.md
          retention-days: 30
