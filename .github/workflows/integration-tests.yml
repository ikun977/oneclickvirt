name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Virtualization environment to test'
        required: true
        type: choice
        options:
          - docker
          - lxd
          - incus
          - podman
          - containerd
          - proxmoxve
          - all
        default: 'docker'
      instance_types:
        description: 'Instance types to test'
        required: true
        type: choice
        options:
          - both
          - container
          - vm
        default: 'both'
      modules:
        description: 'Test modules to run (e.g. all, 01-10, 01,03,05)'
        required: false
        type: string
        default: 'all'
      node_hours:
        description: 'Node lifetime in hours'
        required: false
        type: string
        default: '8'
      report_repo:
        description: 'Repository for publishing test reports (owner/repo)'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: "Resolve test matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ inputs.environment }}" == "all" ]]; then
            echo 'matrix=["docker","lxd","incus","podman","containerd","proxmoxve"]' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[\"${{ inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
          fi

  integration-test:
    needs: setup
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    name: "Test: ${{ matrix.environment }} (${{ inputs.instance_types }})"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl sshpass

      - name: Run integration tests
        env:
          ALICEINIT_TOKEN: ${{ secrets.ALICEINIT_TOKEN }}
          ALICE_API_BASE: ${{ secrets.ALICE_API_BASE }}
          ENV_TYPE: ${{ matrix.environment }}
          INSTANCE_TYPES: ${{ inputs.instance_types }}
          NODE_HOURS: ${{ inputs.node_hours }}
          ADMIN_USER: admin
          ADMIN_PASS: ${{ secrets.TEST_ADMIN_PASS || 'Admin123!@#' }}
        run: |
          chmod +x action_tests/run_env_test.sh
          chmod +x action_tests/run_module.sh
          chmod -R +x action_tests/modules/
          chmod -R +x action_tests/common/
          bash action_tests/run_env_test.sh \
            "${{ matrix.environment }}" \
            "${{ inputs.modules }}" \
            "${{ inputs.instance_types }}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.environment }}-${{ github.run_number }}
          path: |
            action_tests/reports/*.html
            action_tests/reports/*.md
            action_tests/reports/*.log
          retention-days: 30

      - name: Upload test output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.environment }}-${{ github.run_number }}
          path: action_tests/reports/*-output.log
          retention-days: 30

      - name: Generate Pages content
        if: always()
        run: |
          mkdir -p pages-output
          cp action_tests/reports/*.html pages-output/ 2>/dev/null || true
          # Generate index page
          cd action_tests && bash -c '
            source common/test_framework.sh
            generate_index_html "../pages-output/index.html" "../pages-output"
          ' 2>/dev/null || true

      - name: Publish to GitHub Pages (separate repo)
        if: always() && inputs.report_repo != ''
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [[ -z "$PAGES_TOKEN" ]]; then
            echo "Warning: PAGES_DEPLOY_TOKEN secret not set, skipping Pages deployment"
            exit 0
          fi
          REPORT_REPO="${{ inputs.report_repo }}"
          REPORT_BRANCH="gh-pages"
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          ENV="${{ matrix.environment }}"

          # Clone report repo
          git clone --depth 1 --branch "$REPORT_BRANCH" \
            "https://x-access-token:${PAGES_TOKEN}@github.com/${REPORT_REPO}.git" \
            report-repo 2>/dev/null || {
              mkdir -p report-repo
              cd report-repo
              git init
              git checkout -b "$REPORT_BRANCH"
              cd ..
            }

          # Copy reports
          mkdir -p "report-repo/reports/${ENV}/${TIMESTAMP}"
          cp pages-output/*.html "report-repo/reports/${ENV}/${TIMESTAMP}/" 2>/dev/null || true

          # Generate top-level index
          cd report-repo
          cat > index.html << 'IDXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>OneClickVirt Test Reports</title>
          <style>
          :root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--border:#334155}
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:2rem}
          .container{max-width:1000px;margin:0 auto}
          h1{font-size:2rem;margin-bottom:1rem}
          h2{font-size:1.3rem;margin:1.5rem 0 0.8rem}
          .meta{color:#94a3b8;margin-bottom:2rem}
          .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:0.8rem}
          .card:hover{border-color:#60a5fa}
          a{color:#60a5fa;text-decoration:none}
          a:hover{text-decoration:underline}
          </style>
          </head>
          <body>
          <div class="container">
          <h1>OneClickVirt Integration Test Reports</h1>
          <p class="meta">Reports are organized by environment and date.</p>
          IDXEOF

          # List all env dirs
          if [[ -d reports ]]; then
            for envdir in reports/*/; do
              [[ ! -d "$envdir" ]] && continue
              envname=$(basename "$envdir")
              echo "<h2>${envname}</h2>" >> index.html
              # List timestamps in reverse order
              for tsdir in $(ls -dr "$envdir"*/); do
                [[ ! -d "$tsdir" ]] && continue
                tsname=$(basename "$tsdir")
                # Find report files
                for f in "$tsdir"*.html; do
                  [[ ! -f "$f" ]] && continue
                  fname=$(basename "$f")
                  echo "<div class=\"card\"><a href=\"${f}\">${tsname} - ${fname}</a></div>" >> index.html
                done
              done
            done
          fi

          echo "</div></body></html>" >> index.html

          # Commit and push
          git add -A
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Update test reports: ${ENV} ${TIMESTAMP}" || true
          git push "https://x-access-token:${PAGES_TOKEN}@github.com/${REPORT_REPO}.git" "$REPORT_BRANCH" || {
            echo "Failed to push to Pages repo"
            exit 0
          }

      - name: Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ matrix.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance Types | ${{ inputs.instance_types }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Modules | ${{ inputs.modules }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "action_tests/reports/${{ matrix.environment }}-report.md" ]]; then
            cat "action_tests/reports/${{ matrix.environment }}-report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report file found." >> $GITHUB_STEP_SUMMARY
          fi
