name: All Systems Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Cloud platform to use (auto = priority-order fallback)'
        required: false
        type: choice
        options:
          - auto
          - alice
          - lightnode
          - vultr
          - hetzner
          - linode
          - rackdog
          - skrime
          - prepaidhost
          - cubepath
          - cloudsigma
        default: 'auto'
      instance_types:
        description: 'Instance types to test (auto-corrected per platform)'
        required: true
        type: choice
        options:
          - both
          - container
          - vm
        default: 'container'
      modules:
        description: 'Test modules to run (e.g. all, 01-10, 01,03,05)'
        required: false
        type: string
        default: 'all'
      node_hours:
        description: 'Node lifetime in hours'
        required: false
        type: string
        default: '8'
      skip_instance_delete:
        description: 'Skip instance deletion after tests (keep alive) — regardless of this, only 1 machine is kept per platform account'
        required: false
        type: boolean
        default: false
      execution_rule:
        description: 'Provider execution rule (auto=API-first+SSH-fallback, api_only=API-only, ssh_only=SSH-only, all=test all three sequentially with system reset between each)'
        required: false
        type: choice
        options:
          - auto
          - api_only
          - ssh_only
          - all
        default: 'auto'

jobs:
  all-systems-test:
    name: "AllSys: ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        environment:
          - docker
          - lxd
          - incus
          - podman
          - containerd
          - proxmoxve
          - kubevirt
          - qemu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl sshpass python3 python3-pip
          pip3 install --quiet paramiko

      - name: Validate bash syntax of test scripts
        run: |
          set -euo pipefail
          errors=0
          for f in action_tests/modules/*.sh action_tests/common/*.sh action_tests/common/platforms/*.sh \
                   action_tests/run_module.sh action_tests/run_env_test.sh; do
            [[ -f "$f" ]] || continue
            if ! bash -n "$f" 2>/tmp/bash_syntax_err.txt; then
              echo "::error file=${f}::Bash syntax error in ${f}:"
              cat /tmp/bash_syntax_err.txt
              errors=$((errors + 1))
            fi
          done
          if [[ $errors -gt 0 ]]; then
            echo "::error::${errors} bash script(s) have syntax errors. Fix before running CI."
            exit 1
          fi
          echo "All bash scripts passed syntax check."

      - name: Resolve usable cloud platforms
        id: resolve-platforms
        env:
          ALICE_CLIENT_ID: ${{ secrets.ALICE_CLIENT_ID }}
          ALICE_CLIENT_SECRET: ${{ secrets.ALICE_CLIENT_SECRET }}
          ALICE_PUBLIC_KEY: ${{ secrets.ALICE_PUBLIC_KEY }}
          ALICE_PRIVATE_KEY: ${{ secrets.ALICE_PRIVATE_KEY }}
          LIGHTNODE_TOKEN: ${{ secrets.LIGHTNODE_TOKEN }}
          LIGHTNODE_PRIVATE_KEY: ${{ secrets.LIGHTNODE_PRIVATE_KEY }}
          LIGHTNODE_SSH_KEY_UUID: ${{ secrets.LIGHTNODE_SSH_KEY_UUID }}
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          VULTR_PRIVATE_KEY: ${{ secrets.VULTR_PRIVATE_KEY }}
          VULTR_SSH_KEY_ID: ${{ secrets.VULTR_SSH_KEY_ID }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          LINODE_PRIVATE_KEY: ${{ secrets.LINODE_PRIVATE_KEY }}
          LINODE_SSH_PUBLIC_KEY: ${{ secrets.LINODE_SSH_PUBLIC_KEY }}
          RACKDOG_API_KEY: ${{ secrets.RACKDOG_API_KEY }}
          RACKDOG_PRIVATE_KEY: ${{ secrets.RACKDOG_PRIVATE_KEY }}
          RACKDOG_SSH_PUBLIC_KEY: ${{ secrets.RACKDOG_SSH_PUBLIC_KEY }}
          RACKDOG_BILLING_ACCOUNT_ID: ${{ secrets.RACKDOG_BILLING_ACCOUNT_ID }}
          SKRIME_API_KEY: ${{ secrets.SKRIME_API_KEY }}
          SKRIME_ROOT_PASSWORD: ${{ secrets.SKRIME_ROOT_PASSWORD }}
          PREPAIDHOST_API_KEY: ${{ secrets.PREPAIDHOST_API_KEY }}
          PREPAIDHOST_ROOT_PASSWORD: ${{ secrets.PREPAIDHOST_ROOT_PASSWORD }}
          CUBEPATH_API_KEY: ${{ secrets.CUBEPATH_API_KEY }}
          CUBEPATH_PRIVATE_KEY: ${{ secrets.CUBEPATH_PRIVATE_KEY }}
          CUBEPATH_SSH_PUBLIC_KEY: ${{ secrets.CUBEPATH_SSH_PUBLIC_KEY }}
          CLOUDSIGMA_EMAIL: ${{ secrets.CLOUDSIGMA_EMAIL }}
          CLOUDSIGMA_PASSWORD: ${{ secrets.CLOUDSIGMA_PASSWORD }}
          CLOUDSIGMA_PRIVATE_KEY: ${{ secrets.CLOUDSIGMA_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          source action_tests/common/test_framework.sh
          source action_tests/common/platform_interface.sh

          requested_platform="${{ inputs.platform }}"
          if [[ "$requested_platform" == "auto" ]]; then
            candidates=(alice lightnode vultr hetzner linode rackdog skrime prepaidhost cubepath cloudsigma)
          else
            candidates=("$requested_platform")
          fi

          usable_platforms=()
          for platform in "${candidates[@]}"; do
            log_info "Checking platform availability: ${platform}"
            log_file="/tmp/platform-init-${platform}.log"
            if platform_init "$platform" >"$log_file" 2>&1; then
              usable_platforms+=("$platform")
              log_success "Platform '${platform}' is usable for this run"
            else
              reason=$(tail -1 "$log_file" 2>/dev/null | sed -E 's/\x1b\[[0-9;]*m//g')
              if [[ -z "$reason" ]]; then
                reason="initialization failed"
              fi
              echo "::warning::Platform '${platform}' unavailable: ${reason}"
            fi
          done

          if [[ ${#usable_platforms[@]} -eq 0 ]]; then
            echo "::error::No usable cloud platforms are configured for platform='${requested_platform}'. Configure the required repository secrets or choose a configured platform."
            exit 1
          fi

          usable_csv=$(IFS=,; echo "${usable_platforms[*]}")
          usable_order=$(IFS=' '; echo "${usable_platforms[*]}")
          echo "usable_platforms=${usable_csv}" >> "$GITHUB_OUTPUT"
          echo "platform_priority=${usable_order}" >> "$GITHUB_OUTPUT"
          echo "Resolved usable cloud platforms: ${usable_order}"

      - name: Set server version from latest release
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // "v0.3.0"')
          sed -i "s/const ServerVersion = \".*\"/const ServerVersion = \"${LATEST_TAG}\"/" server/constant/version.go
          echo "Server version set to: ${LATEST_TAG}"

      - name: Setup MySQL
        run: |
          sudo systemctl start mysql
          sleep 5
          if sudo mysql -e "SELECT 1" 2>/dev/null; then
            echo "auth_socket OK – configuring root with mysql_native_password"
            sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; DROP USER IF EXISTS 'root'@'127.0.0.1'; CREATE USER 'root'@'127.0.0.1' IDENTIFIED WITH mysql_native_password BY ''; GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION; FLUSH PRIVILEGES;"
          else
            echo "auth_socket failed – trying with password 'root'"
            mysql -u root -proot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; DROP USER IF EXISTS 'root'@'127.0.0.1'; CREATE USER 'root'@'127.0.0.1' IDENTIFIED WITH mysql_native_password BY ''; GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION; FLUSH PRIVILEGES;"
          fi
          mysql -u root -h 127.0.0.1 -P 3306 -e "SELECT 1;" && echo "MySQL TCP OK"

      - name: Validate platform and instance types
        id: validate
        run: |
          ENV="${{ matrix.environment }}"
          TYPES="${{ inputs.instance_types }}"
          PLATFORM="${{ inputs.platform }}"
          case "$ENV" in
            docker|podman|containerd)
              if [[ "$TYPES" == "vm" || "$TYPES" == "both" ]]; then
                echo "::warning::Platform '${ENV}' only supports containers. Auto-correcting instance_types to 'container'."
                TYPES="container"
              fi
              ;;
            lxd|incus|proxmoxve)
              ;;
            kubevirt|qemu)
              if [[ "$TYPES" == "container" || "$TYPES" == "both" ]]; then
                echo "::warning::Platform '${ENV}' only supports VMs. Auto-correcting instance_types to 'vm'."
                TYPES="vm"
              fi
              ;;
            *)
              echo "::error::Unknown platform: ${ENV}"
              exit 1
              ;;
          esac
          echo "instance_types=${TYPES}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "Validated: env=${ENV} instance_types=${TYPES} platform=${PLATFORM}"

      - name: Run all-systems tests
        id: run-tests
        env:
          # Alice platform
          ALICE_CLIENT_ID: ${{ secrets.ALICE_CLIENT_ID }}
          ALICE_CLIENT_SECRET: ${{ secrets.ALICE_CLIENT_SECRET }}
          ALICE_PUBLIC_KEY: ${{ secrets.ALICE_PUBLIC_KEY }}
          ALICE_PRIVATE_KEY: ${{ secrets.ALICE_PRIVATE_KEY }}
          # LightNode platform
          LIGHTNODE_TOKEN: ${{ secrets.LIGHTNODE_TOKEN }}
          LIGHTNODE_PRIVATE_KEY: ${{ secrets.LIGHTNODE_PRIVATE_KEY }}
          LIGHTNODE_SSH_KEY_UUID: ${{ secrets.LIGHTNODE_SSH_KEY_UUID }}
          # Vultr platform
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          VULTR_PRIVATE_KEY: ${{ secrets.VULTR_PRIVATE_KEY }}
          VULTR_SSH_KEY_ID: ${{ secrets.VULTR_SSH_KEY_ID }}
          # Hetzner platform
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          HETZNER_PRIVATE_KEY: ${{ secrets.HETZNER_PRIVATE_KEY }}
          HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          # Linode platform
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          LINODE_PRIVATE_KEY: ${{ secrets.LINODE_PRIVATE_KEY }}
          LINODE_SSH_PUBLIC_KEY: ${{ secrets.LINODE_SSH_PUBLIC_KEY }}
          # RackDog platform
          RACKDOG_API_KEY: ${{ secrets.RACKDOG_API_KEY }}
          RACKDOG_PRIVATE_KEY: ${{ secrets.RACKDOG_PRIVATE_KEY }}
          RACKDOG_SSH_PUBLIC_KEY: ${{ secrets.RACKDOG_SSH_PUBLIC_KEY }}
          RACKDOG_BILLING_ACCOUNT_ID: ${{ secrets.RACKDOG_BILLING_ACCOUNT_ID }}
          # Skrime platform
          SKRIME_API_KEY: ${{ secrets.SKRIME_API_KEY }}
          SKRIME_ROOT_PASSWORD: ${{ secrets.SKRIME_ROOT_PASSWORD }}
          # PrepaidHost platform
          PREPAIDHOST_API_KEY: ${{ secrets.PREPAIDHOST_API_KEY }}
          PREPAIDHOST_ROOT_PASSWORD: ${{ secrets.PREPAIDHOST_ROOT_PASSWORD }}
          # Cubepath platform
          CUBEPATH_API_KEY: ${{ secrets.CUBEPATH_API_KEY }}
          CUBEPATH_PRIVATE_KEY: ${{ secrets.CUBEPATH_PRIVATE_KEY }}
          CUBEPATH_SSH_PUBLIC_KEY: ${{ secrets.CUBEPATH_SSH_PUBLIC_KEY }}
          # CloudSigma platform
          CLOUDSIGMA_EMAIL: ${{ secrets.CLOUDSIGMA_EMAIL }}
          CLOUDSIGMA_PASSWORD: ${{ secrets.CLOUDSIGMA_PASSWORD }}
          CLOUDSIGMA_PRIVATE_KEY: ${{ secrets.CLOUDSIGMA_PRIVATE_KEY }}
          # Platform selection
          PLATFORM_SELECTION: ${{ steps.validate.outputs.platform }}
          SKIP_INSTANCE_DELETE: ${{ inputs.skip_instance_delete }}
          # Test settings — always test ALL system images
          ENV_TYPE: ${{ matrix.environment }}
          INSTANCE_TYPES: ${{ steps.validate.outputs.instance_types }}
          NODE_HOURS: ${{ inputs.node_hours }}
          EXECUTION_RULE: ${{ inputs.execution_rule }}
          FULL_SYSTEM_TEST: 'true'
          TEST_IMAGES: 'all'
          ADMIN_USER: admin
          ADMIN_PASS: ${{ secrets.TEST_ADMIN_PASS != '' && secrets.TEST_ADMIN_PASS || 'Admin@123456' }}
          DEBUG: "1"
        run: |
          set -euo pipefail

          chmod +x action_tests/run_env_test.sh
          chmod +x action_tests/run_module.sh
          chmod -R +x action_tests/modules/ 2>/dev/null || true
          chmod -R +x action_tests/common/ 2>/dev/null || true
          chmod -R +x action_tests/report/ 2>/dev/null || true
          mkdir -p action_tests/reports

          RESOLVED_PLATFORMS="${{ steps.resolve-platforms.outputs.usable_platforms }}"
          if [[ -z "$RESOLVED_PLATFORMS" ]]; then
            echo "::error::No validated cloud platforms were resolved for this run."
            exit 1
          fi

          export PLATFORM_ALICE_ENABLED=false
          export PLATFORM_LIGHTNODE_ENABLED=false
          export PLATFORM_VULTR_ENABLED=false
          export PLATFORM_HETZNER_ENABLED=false
          export PLATFORM_LINODE_ENABLED=false
          export PLATFORM_RACKDOG_ENABLED=false
          export PLATFORM_SKRIME_ENABLED=false
          export PLATFORM_PREPAIDHOST_ENABLED=false
          export PLATFORM_CUBEPATH_ENABLED=false
          export PLATFORM_CLOUDSIGMA_ENABLED=false

          for platform in ${RESOLVED_PLATFORMS//,/ }; do
            PLATFORM_VAR="PLATFORM_$(echo "$platform" | tr '[:lower:]' '[:upper:]')_ENABLED"
            export "${PLATFORM_VAR}=true"
          done
          export PLATFORM_PRIORITY_ORDER="${{ steps.resolve-platforms.outputs.platform_priority }}"
          echo "Using validated cloud platforms: ${PLATFORM_PRIORITY_ORDER}"

          set +e
          bash action_tests/run_env_test.sh \
            "${{ matrix.environment }}" \
            "${{ inputs.modules }}" \
            "${{ steps.validate.outputs.instance_types }}" 2>&1 | tee action_tests/reports/full-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          echo "test_exit=${TEST_EXIT}" >> "$GITHUB_OUTPUT"

          if [[ ! -s action_tests/reports/full-output.log ]]; then
            echo "WARNING: Test produced no output. Check that required platform secrets are configured." > action_tests/reports/full-output.log
          fi

          if ! ls action_tests/reports/*.html 1>/dev/null 2>&1; then
            echo "<html><body><h1>Test Failed</h1><p>Exit code: ${TEST_EXIT}</p><pre>$(cat action_tests/reports/full-output.log | tail -100)</pre></body></html>" > "action_tests/reports/${{ matrix.environment }}-report.html"
          fi

          exit 0

      - name: Validate all-systems test results
        if: always()
        env:
          TEST_EXIT: ${{ steps.run-tests.outputs.test_exit }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          result_files=(action_tests/reports/*.jsonl)
          if [[ ${#result_files[@]} -eq 0 ]]; then
            echo "::error::All-systems tests did not produce any JSONL result files."
            [[ -f action_tests/reports/full-output.log ]] && tail -200 action_tests/reports/full-output.log || true
            exit 1
          fi

          total=$(cat "${result_files[@]}" | jq -s 'length')
          passed=$(cat "${result_files[@]}" | jq -s '[.[] | select(.status == "PASS")] | length')
          failed=$(cat "${result_files[@]}" | jq -s '[.[] | select(.status == "FAIL")] | length')
          skipped=$(cat "${result_files[@]}" | jq -s '[.[] | select(.status == "SKIP")] | length')
          executed=$((passed + failed))

          {
            echo "## All-Systems Test Validation"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Resolved Platforms | ${{ steps.resolve-platforms.outputs.platform_priority }} |"
            echo "| Harness Exit Code | ${TEST_EXIT:-0} |"
            echo "| Total | ${total} |"
            echo "| Passed | ${passed} |"
            echo "| Failed | ${failed} |"
            echo "| Skipped | ${skipped} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${TEST_EXIT:-}" && "${TEST_EXIT}" != "0" ]]; then
            echo "::error::All-systems harness exited with code ${TEST_EXIT}."
            exit 1
          fi

          if [[ "$total" -eq 0 ]]; then
            echo "::error::All-systems tests produced an empty result set."
            exit 1
          fi

          if [[ "$executed" -eq 0 ]]; then
            echo "::error::All-systems tests produced only skipped checks; no executable assertions ran."
            exit 1
          fi

          if [[ "$failed" -ne 0 ]]; then
            echo "::error::All-systems tests recorded ${failed} failing assertions."
            exit 1
          fi

      - name: Show log on failure
        if: failure()
        run: |
          echo "=== All-Systems Test Output (last 200 lines) ==="
          tail -200 action_tests/reports/full-output.log || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allsys-test-reports-${{ matrix.environment }}-${{ github.run_number }}
          path: |
            action_tests/reports/*.html
            action_tests/reports/*.md
            action_tests/reports/*.log
            action_tests/reports/*.txt
            action_tests/reports/*.jsonl
          retention-days: 30

      - name: Publish to GitHub Pages
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_BRANCH="gh-pages"
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          # Use "allsys-" prefix to distinguish from regular integration tests in gh-pages
          ENV="allsys-${{ matrix.environment }}"

          git clone --depth 1 --branch "$REPORT_BRANCH" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            report-repo 2>/dev/null || {
              mkdir -p report-repo
              cd report-repo
              git init
              git checkout -b "$REPORT_BRANCH"
              cd ..
            }

          mkdir -p "report-repo/reports/${ENV}/${TIMESTAMP}"
          cp action_tests/reports/*.html "report-repo/reports/${ENV}/${TIMESTAMP}/" 2>/dev/null || true
          cp action_tests/reports/*.jsonl "report-repo/reports/${ENV}/${TIMESTAMP}/" 2>/dev/null || true

          KEEP=7
          if [[ -d "report-repo/reports/${ENV}" ]]; then
            SORTED=$(ls -d "report-repo/reports/${ENV}/"*/ 2>/dev/null | sort -r)
            COUNT=0
            while IFS= read -r dir; do
              COUNT=$((COUNT + 1))
              if [[ $COUNT -gt $KEEP ]]; then
                rm -rf "$dir"
                echo "Pruned old report: $dir"
              fi
            done <<< "$SORTED"
          fi

          bash action_tests/report/generate_index.sh "report-repo/reports" "report-repo/index.html"

          cd report-repo
          git add -A
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Update all-systems test reports: ${ENV} ${TIMESTAMP}" || true
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$REPORT_BRANCH" 2>/dev/null || {
            echo "::warning::Failed to push to gh-pages. This is non-critical."
          }

      - name: Summary
        if: always()
        run: |
          echo "## All-Systems Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ matrix.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | ${{ inputs.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolved Cloud Platforms | ${{ steps.resolve-platforms.outputs.platform_priority }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance Types | ${{ steps.validate.outputs.instance_types }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Modules | ${{ inputs.modules }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Images | all systems |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "action_tests/reports/${{ matrix.environment }}-report.md" ]]; then
            cat "action_tests/reports/${{ matrix.environment }}-report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No markdown report file found." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Last 30 lines of test output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 action_tests/reports/full-output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output log found"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
