name: Build and Release oneclickvirt

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-agent-amd64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl

    - name: Install musl tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          server/agent/target
        key: ${{ runner.os }}-cargo-amd64-${{ hashFiles('server/agent/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-amd64-

    - name: Build monitoring agent (AMD64)
      working-directory: ./server/agent
      run: |
        cargo build --release --target x86_64-unknown-linux-musl
        cp target/x86_64-unknown-linux-musl/release/oneclickvirt-agent oneclickvirt-agent-linux-amd64

    - name: Upload AMD64 agent artifact
      uses: actions/upload-artifact@v6
      with:
        name: agent-amd64
        path: server/agent/oneclickvirt-agent-linux-amd64

  build-agent-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-musl

    - name: Install musl tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Cache Rust dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          server/agent/target
        key: Linux-arm64-cargo-arm64-${{ hashFiles('server/agent/Cargo.lock') }}
        restore-keys: |
          Linux-arm64-cargo-arm64-

    - name: Build monitoring agent (ARM64)
      working-directory: ./server/agent
      run: |
        cargo build --release --target aarch64-unknown-linux-musl
        cp target/aarch64-unknown-linux-musl/release/oneclickvirt-agent oneclickvirt-agent-linux-arm64

    - name: Upload ARM64 agent artifact
      uses: actions/upload-artifact@v6
      with:
        name: agent-arm64
        path: server/agent/oneclickvirt-agent-linux-arm64

  build-and-release:
    runs-on: ubuntu-latest
    needs: [build-agent-amd64, build-agent-arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.24.5
        cache: true
        cache-dependency-path: server/go.sum

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create build directory
      run: mkdir -p build

    - name: Download agent artifacts
      uses: actions/download-artifact@v7
      with:
        path: build/agents

    - name: Stage agent binaries
      run: |
        cp build/agents/agent-amd64/oneclickvirt-agent-linux-amd64 build/oneclickvirt-agent-linux-amd64
        cp build/agents/agent-arm64/oneclickvirt-agent-linux-arm64 build/oneclickvirt-agent-linux-arm64
        chmod +x build/oneclickvirt-agent-linux-amd64 build/oneclickvirt-agent-linux-arm64

    - name: Prepare controller agent assets
      run: |
        mkdir -p build/controller-agent web/public/controller-agent server/assets/agent
        cp install_agent.sh build/controller-agent/install_agent.sh
        cp install_agent.sh web/public/controller-agent/install_agent.sh
        cp install_agent.sh server/assets/agent/install_agent.sh

        tmp_amd64=$(mktemp -d)
        cp build/oneclickvirt-agent-linux-amd64 "$tmp_amd64/oneclickvirt-agent"
        tar -C "$tmp_amd64" -czf build/controller-agent/oneclickvirt-agent-linux-amd64.tar.gz oneclickvirt-agent
        rm -rf "$tmp_amd64"

        tmp_arm64=$(mktemp -d)
        cp build/oneclickvirt-agent-linux-arm64 "$tmp_arm64/oneclickvirt-agent"
        tar -C "$tmp_arm64" -czf build/controller-agent/oneclickvirt-agent-linux-arm64.tar.gz oneclickvirt-agent
        rm -rf "$tmp_arm64"

        cp build/controller-agent/oneclickvirt-agent-linux-amd64.tar.gz web/public/controller-agent/
        cp build/controller-agent/oneclickvirt-agent-linux-arm64.tar.gz web/public/controller-agent/
        cp build/controller-agent/oneclickvirt-agent-linux-amd64.tar.gz server/assets/agent/
        cp build/controller-agent/oneclickvirt-agent-linux-arm64.tar.gz server/assets/agent/

    - name: Update version constants for this release
      run: |
        TAG_NAME="v${{ steps.date.outputs.date }}"
        sed -i "s/const ServerVersion = \".*\"/const ServerVersion = \"${TAG_NAME}\"/" server/constant/version.go
        sed -i "s/const CompatibleAgentVersion = \".*\"/const CompatibleAgentVersion = \"${TAG_NAME}\"/" server/constant/version.go
        echo "Updated version constants to: ${TAG_NAME}"
        cat server/constant/version.go

    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: web/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('web/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Build Vue web application
      run: |
        cd web
        npm ci || npm install
        npm install @rollup/rollup-linux-x64-gnu --save-dev --force
        npm run build
        cd dist
        zip -r ../../build/web-dist.zip .

    - name: Build Go server binaries (Standalone - without embedded frontend)
      working-directory: ./server
      run: |
        export GO111MODULE=on
        go mod download
        go mod verify
        export CGO_ENABLED=0
        BUILD_COMMIT=$(git rev-parse HEAD)
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        BUILD_SIGNATURE="official-github-actions"
        export LDFLAGS="-s -w -extldflags '-static' -X oneclickvirt/constant.BuildCommit=${BUILD_COMMIT} -X oneclickvirt/constant.BuildTime=${BUILD_TIME} -X oneclickvirt/constant.BuildSignature=${BUILD_SIGNATURE}"
        
        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o ../build/server-linux-amd64 .
        
        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o ../build/server-linux-arm64 .
        
        # Windows AMD64
        GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o ../build/server-windows-amd64.exe .
        
        # Windows ARM64
        GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o ../build/server-windows-arm64.exe .

    - name: Prepare embedded frontend
      run: |
        mkdir -p server/service/router/dist
        cp -r web/dist/* server/service/router/dist/
        ls -la server/service/router/dist/

    - name: Build Go server binaries (All-in-one - with embedded frontend)
      working-directory: ./server
      run: |
        export GO111MODULE=on
        export CGO_ENABLED=0
        BUILD_COMMIT=$(git rev-parse HEAD)
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        BUILD_SIGNATURE="official-github-actions"
        export LDFLAGS="-s -w -extldflags '-static' -X oneclickvirt/constant.BuildCommit=${BUILD_COMMIT} -X oneclickvirt/constant.BuildTime=${BUILD_TIME} -X oneclickvirt/constant.BuildSignature=${BUILD_SIGNATURE}"
        
        # Linux AMD64 (with embedded frontend)
        GOOS=linux GOARCH=amd64 go build -tags embed -ldflags="$LDFLAGS" -o ../build/server-allinone-linux-amd64 .
        
        # Linux ARM64 (with embedded frontend)
        GOOS=linux GOARCH=arm64 go build -tags embed -ldflags="$LDFLAGS" -o ../build/server-allinone-linux-arm64 .
        
        # Windows AMD64 (with embedded frontend)
        GOOS=windows GOARCH=amd64 go build -tags embed -ldflags="$LDFLAGS" -o ../build/server-allinone-windows-amd64.exe .
        
        # Windows ARM64 (with embedded frontend)
        GOOS=windows GOARCH=arm64 go build -tags embed -ldflags="$LDFLAGS" -o ../build/server-allinone-windows-arm64.exe .

    - name: Compress binaries
      run: |
        cd build
        # Compress standalone binaries
        tar -czf server-linux-amd64.tar.gz server-linux-amd64
        tar -czf server-linux-arm64.tar.gz server-linux-arm64
        zip server-windows-amd64.zip server-windows-amd64.exe
        zip server-windows-arm64.zip server-windows-arm64.exe
        
        # Compress all-in-one binaries
        tar -czf server-allinone-linux-amd64.tar.gz server-allinone-linux-amd64
        tar -czf server-allinone-linux-arm64.tar.gz server-allinone-linux-arm64
        zip server-allinone-windows-amd64.zip server-allinone-windows-amd64.exe
        zip server-allinone-windows-arm64.zip server-allinone-windows-arm64.exe
        
        # Compress agent binaries
        cp controller-agent/oneclickvirt-agent-linux-amd64.tar.gz oneclickvirt-agent-linux-amd64.tar.gz
        cp controller-agent/oneclickvirt-agent-linux-arm64.tar.gz oneclickvirt-agent-linux-arm64.tar.gz
        
        # Remove uncompressed binaries
        rm server-linux-amd64 server-linux-arm64 server-windows-amd64.exe server-windows-arm64.exe
        rm server-allinone-linux-amd64 server-allinone-linux-arm64 server-allinone-windows-amd64.exe server-allinone-windows-arm64.exe
        rm oneclickvirt-agent-linux-amd64 oneclickvirt-agent-linux-arm64
        
        ls -lh

    - name: Get previous release tag
      id: get_previous_tag
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
        echo "Previous release tag: $PREVIOUS_TAG"
    
    - name: Create Release with Auto-generated Notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="v${{ steps.date.outputs.date }}"
        PREVIOUS_TAG="${{ steps.get_previous_tag.outputs.previous_tag }}"
        
        # Build release body header
        RELEASE_HEADER="## 自动构建发布 - ${{ steps.date.outputs.date }}
        
        ### 独立部署版本（需要分别部署前后端）
        - \`server-linux-amd64.tar.gz\` - 后端 Linux AMD64 版本
        - \`server-linux-arm64.tar.gz\` - 后端 Linux ARM64 版本  
        - \`server-windows-amd64.zip\` - 后端 Windows AMD64 版本
        - \`server-windows-arm64.zip\` - 后端 Windows ARM64 版本
        - \`web-dist.zip\` - 前端静态文件
        
        ### 一体化部署版本（前端已内嵌，单二进制文件部署）
        - \`server-allinone-linux-amd64.tar.gz\` - 一体化 Linux AMD64 版本
        - \`server-allinone-linux-arm64.tar.gz\` - 一体化 Linux ARM64 版本
        - \`server-allinone-windows-amd64.zip\` - 一体化 Windows AMD64 版本
        - \`server-allinone-windows-arm64.zip\` - 一体化 Windows ARM64 版本
        
        ### 监控代理（部署到 Provider 节点）
        - \`oneclickvirt-agent-linux-amd64.tar.gz\` - 监控代理 Linux AMD64 版本
        - \`oneclickvirt-agent-linux-arm64.tar.gz\` - 监控代理 Linux ARM64 版本"
        
        # Create release with auto-generated notes
        if [ -n "$PREVIOUS_TAG" ]; then
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "$RELEASE_HEADER" \
            --notes-start-tag "$PREVIOUS_TAG" \
            --generate-notes \
            ./build/server-linux-amd64.tar.gz \
            ./build/server-linux-arm64.tar.gz \
            ./build/server-windows-amd64.zip \
            ./build/server-windows-arm64.zip \
            ./build/server-allinone-linux-amd64.tar.gz \
            ./build/server-allinone-linux-arm64.tar.gz \
            ./build/server-allinone-windows-amd64.zip \
            ./build/server-allinone-windows-arm64.zip \
            ./build/oneclickvirt-agent-linux-amd64.tar.gz \
            ./build/oneclickvirt-agent-linux-arm64.tar.gz \
            ./build/web-dist.zip
        else
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "$RELEASE_HEADER" \
            --generate-notes \
            ./build/server-linux-amd64.tar.gz \
            ./build/server-linux-arm64.tar.gz \
            ./build/server-windows-amd64.zip \
            ./build/server-windows-arm64.zip \
            ./build/server-allinone-linux-amd64.tar.gz \
            ./build/server-allinone-linux-arm64.tar.gz \
            ./build/server-allinone-windows-amd64.zip \
            ./build/server-allinone-windows-arm64.zip \
            ./build/oneclickvirt-agent-linux-amd64.tar.gz \
            ./build/oneclickvirt-agent-linux-arm64.tar.gz \
            ./build/web-dist.zip
        fi
